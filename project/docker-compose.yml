services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-board_games_bot}
      POSTGRES_USER: ${POSTGRES_USER:-board_games}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-board_games}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - qdrant
    env_file:
      - .env
    volumes:
      - ./:/app

volumes:
  postgres_data:
  qdrant_data:

